<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management - CampusBite</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="logo">CampusBite <span style="font-size: 1rem; color: #666;">(Admin)</span></div>
            <div class="nav-links">
                <a href="admin-dashboard.html">Dashboard</a>
                <a href="admin-menu.html" style="color: var(--primary-color);">Menu Management</a>
                <a href="/api/logout">Logout</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2>Manage Food Menu</h2>
            <button class="btn-primary" style="width: auto; padding: 0.5rem 1rem;" onclick="openAddModal()">+ Add New
                Item</button>
        </div>

        <table id="menu-table">
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price (₹)</th>
                    <th>Stock</th>
                    <th>Type</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Rows injected via JS -->
            </tbody>
        </table>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="menu-modal">
        <div class="modal">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Add Food Item</h2>

            <form class="checkout-form" id="menu-form" onsubmit="saveFoodItem(event)">
                <input type="hidden" id="food-id">

                <input type="text" id="food-name" placeholder="Food Name" required>

                <select id="food-category" required>
                    <option value="">Select Category</option>
                    <option value="Veg">Veg</option>
                    <option value="Non-Veg">Non-Veg</option>
                    <option value="Combos">Combos</option>
                    <option value="Beverages">Beverages</option>
                </select>

                <input type="number" id="food-price" placeholder="Price (₹)" step="0.01" required>
                <input type="number" id="food-stock" placeholder="Quantity Available" required>

                <select id="food-type" required>
                    <option value="true">Vegetarian</option>
                    <option value="false">Non-Vegetarian</option>
                </select>

                <input type="text" id="food-image" placeholder="Image Filename (e.g., burger.jpg)" required>
                <input type="text" id="food-desc" placeholder="Short Description">

                <button type="submit" class="btn-primary" style="margin-top: 1rem;">Save Item</button>
            </form>
        </div>
    </div>

    <script>
        let menuItems = [];

        document.addEventListener("DOMContentLoaded", () => {
            fetchMenuAdmin();
        });

        async function fetchMenuAdmin() {
            try {
                const response = await fetch('/api/food');
                if (response.status === 401) {
                    window.location.href = 'admin-login.html';
                    return;
                }
                menuItems = await response.json();
                renderMenuAdmin();
            } catch (error) {
                console.error(error);
            }
        }

        function renderMenuAdmin() {
            const tbody = document.querySelector('#menu-table tbody');
            tbody.innerHTML = '';

            menuItems.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="images/${item.imageUrl}" style="width:50px; height:50px; object-fit:cover; border-radius:4px;" onerror="this.src='https://via.placeholder.com/50'"></td>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.category}</td>
                    <td>₹${item.price.toFixed(2)}</td>
                    <td>${item.quantityAvailable <= 0 ? '<span style="color:red;font-weight:bold;">Sold Out</span>' : item.quantityAvailable}</td>
                    <td><span class="badge ${item.isVeg ? 'veg' : 'non-veg'}">${item.isVeg ? 'Veg' : 'Non-Veg'}</span></td>
                    <td>
                        <button class="action-btn btn-info" onclick="editItem(${item.id})">Edit</button>
                        <button class="action-btn btn-danger" onclick="deleteItem(${item.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openAddModal() {
            document.getElementById('menu-form').reset();
            document.getElementById('food-id').value = '';
            document.getElementById('modal-title').innerText = 'Add Food Item';
            document.getElementById('menu-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('menu-modal').classList.remove('active');
        }

        function editItem(id) {
            const item = menuItems.find(i => i.id === id);
            if (!item) return;

            document.getElementById('food-id').value = item.id;
            document.getElementById('food-name').value = item.name;
            document.getElementById('food-category').value = item.category;
            document.getElementById('food-price').value = item.price;
            document.getElementById('food-stock').value = item.quantityAvailable;
            document.getElementById('food-type').value = item.isVeg.toString();
            document.getElementById('food-image').value = item.imageUrl;
            document.getElementById('food-desc').value = item.description || '';

            document.getElementById('modal-title').innerText = 'Edit Food Item';
            document.getElementById('menu-modal').classList.add('active');
        }

        async function saveFoodItem(event) {
            event.preventDefault();

            const id = document.getElementById('food-id').value;
            const payload = {
                name: document.getElementById('food-name').value,
                category: document.getElementById('food-category').value,
                price: parseFloat(document.getElementById('food-price').value),
                quantityAvailable: parseInt(document.getElementById('food-stock').value),
                isVeg: document.getElementById('food-type').value === 'true',
                imageUrl: document.getElementById('food-image').value,
                description: document.getElementById('food-desc').value
            };

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `/api/food/${id}` : '/api/food';

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    closeModal();
                    fetchMenuAdmin();
                } else {
                    alert('Failed to save item');
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;

            try {
                const response = await fetch(`/api/food/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    fetchMenuAdmin();
                } else {
                    alert('Failed to delete item');
                }
            } catch (error) {
                console.error(error);
            }
        }
    </script>
</body>

</html>
