<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to CampusBite</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .landing-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .landing-card {
            background-color: var(--surface);
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .landing-card h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        .landing-card p {
            color: var(--text-light);
            margin-bottom: 2rem;
        }
        .role-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            background-color: var(--surface-alt);
            color: var(--text-main);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.3s;
        }
        .role-btn:hover {
            border-color: var(--primary-color);
            background-color: white;
        }
        .hidden {
            display: none;
        }
        .back-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar" style="justify-content: center;">
            <div class="logo">CampusBite</div>
        </div>
    </header>

    <div class="container landing-container">
        <!-- Role Selection Screen -->
        <div class="landing-card" id="role-screen">
            <h1>Welcome to CampusBite</h1>
            <p>Select your role to continue</p>
            
            <button class="role-btn" onclick="showScreen('student-screen')">👩‍🎓 I am a Student</button>
            <button class="role-btn" onclick="showScreen('admin-screen')">👨‍🍳 I am Canteen Staff (Admin)</button>
        </div>

        <!-- Student "Login" Screen -->
        <div class="landing-card hidden" id="student-screen">
            <h1>Student Access</h1>
            <p>Browse the menu, add items to cart, and pre-order your meals without an account!</p>
            
            <button class="btn-primary" style="font-size: 1.1rem; padding: 1rem;" onclick="window.location.href='menu.html'">Enter Canteen Menu</button>
            
            <a class="back-link" onclick="showScreen('role-screen')">← Back</a>
        </div>

        <!-- Admin Login Screen -->
        <div class="landing-card hidden" id="admin-screen">
            <h1>Staff Login</h1>
            <p>Enter your credentials to manage the canteen.</p>
            
            <div id="error-msg" style="color: red; margin-bottom: 1rem; display: none;">
                Invalid username or password.
            </div>

            <form action="/api/login" method="POST" style="text-align: left;">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" style="width:100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px;" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" style="width:100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px;" required>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 1rem; width: 100%;">Login as Staff</button>
            </form>

            <a class="back-link" onclick="showScreen('role-screen')">← Back</a>
        </div>
    </div>

    <script>
        function showScreen(screenId) {
            document.getElementById('role-screen').classList.add('hidden');
            document.getElementById('student-screen').classList.add('hidden');
            document.getElementById('admin-screen').classList.add('hidden');
            
            document.getElementById(screenId).classList.remove('hidden');
        }

        // Show error message if redirected back with ?error=true
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            showScreen('admin-screen');
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>
</html>
