<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CampusBite</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">CampusBite <span style="font-size: 1rem; color: #666;">(Admin)</span></div>
            <div class="nav-links">
                <a href="admin-dashboard.html" style="color: var(--primary-color);">Dashboard</a>
                <a href="admin-menu.html">Menu Management</a>
                <a href="/api/logout">Logout</a>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 1.5rem;">Today's Overview</h2>
        
        <div class="admin-stats">
            <div class="stat-card">
                <h3>Pending Orders</h3>
                <div class="stat-value" id="stat-pending">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Orders</h3>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <h3>Revenue</h3>
                <div class="stat-value" id="stat-revenue">₹0</div>
            </div>
        </div>

        <h2 style="margin-bottom: 1rem; margin-top: 2rem;">Recent Orders</h2>
        <table id="orders-table">
            <thead>
                <tr>
                    <th>Token</th>
                    <th>Student Name</th>
                    <th>Roll Number</th>
                    <th>Items</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Rows injected via JS -->
                <tr><td colspan="7" style="text-align: center;">Loading orders...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="js/admin.js"></script>
    <script>
        // Start auto-refresh for dashboard
        document.addEventListener("DOMContentLoaded", () => {
            fetchOrders();
            setInterval(fetchOrders, 30000); // refresh every 30 seconds
        });
    </script>
</body>
</html>
