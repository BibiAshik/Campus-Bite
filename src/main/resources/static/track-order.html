<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - CampusBite</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo"><a href="menu.html">CampusBite</a></div>
            <div class="nav-links">
                <a href="menu.html">Menu</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h1>Track Your Order</h1>
            <p>Enter your token number to check the status.</p>
        </div>

        <div style="max-width: 500px; margin: 0 auto; text-align: center;">
            <input type="text" id="track-token-input" class="search-bar" placeholder="e.g. A-047" style="width: 70%; margin-bottom: 1rem;">
            <button class="btn-primary" onclick="trackOrder()" style="width: 25%;">Track</button>
            
            <div id="track-result" style="margin-top: 2rem; display: none; background-color: var(--surface); padding: 2rem; border-radius: var(--radius); box-shadow: var(--shadow);">
                <h3 id="track-token-display" style="color: var(--primary-color);"></h3>
                <p style="margin-top: 1rem;">Student: <strong id="track-student"></strong></p>
                <p>Status: <span id="track-status" class="status-badge"></span></p>
                <p>Total Amount: <strong id="track-amount"></strong></p>
                
                <h4 style="margin-top: 1.5rem; text-align: left;">Order Items:</h4>
                <ul id="track-items" style="list-style-type: none; text-align: left; padding-left: 0; margin-top: 0.5rem; color: var(--text-light);">
                </ul>
            </div>
            <div id="track-error" style="margin-top: 1rem; color: red; display: none;">
                Order not found. Please check your token number.
            </div>
        </div>
    </div>

    <script>
        async function trackOrder() {
            const token = document.getElementById('track-token-input').value.trim();
            if (!token) return;

            const resultDiv = document.getElementById('track-result');
            const errorDiv = document.getElementById('track-error');

            try {
                const response = await fetch(`/api/orders/track/${token}`);
                if (response.ok) {
                    const data = await response.json();
                    
                    document.getElementById('track-token-display').innerText = data.tokenNumber;
                    document.getElementById('track-student').innerText = data.studentName;
                    document.getElementById('track-amount').innerText = `₹${data.totalAmount.toFixed(2)}`;
                    
                    const statusBadge = document.getElementById('track-status');
                    statusBadge.innerText = data.status;
                    statusBadge.className = `status-badge status-${data.status}`;

                    const itemsList = document.getElementById('track-items');
                    itemsList.innerHTML = '';
                    data.items.forEach(item => {
                        const li = document.createElement('li');
                        li.innerText = `${item.quantity}x ${item.foodItem.name}`;
                        itemsList.appendChild(li);
                    });

                    resultDiv.style.display = 'block';
                    errorDiv.style.display = 'none';
                } else {
                    resultDiv.style.display = 'none';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error(error);
                resultDiv.style.display = 'none';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
