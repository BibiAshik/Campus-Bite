<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusBite - Canteen Pre-Order</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="logo">CampusBite</div>
            <div class="nav-links">
                <a href="track-order.html">Track Order</a>
                <div class="cart-icon" onclick="openCart()">
                    🛒 Cart <span class="cart-count" id="cart-count">0</span>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h1>Skip the Queue.</h1>
            <p>Pre-order your canteen meals and pick them up when ready.</p>
        </div>

        <div class="controls">
            <div class="filters" id="category-filters">
                <button class="filter-btn active" onclick="filterMenu('All')">All</button>
                <button class="filter-btn" onclick="filterMenu('Veg')">Veg</button>
                <button class="filter-btn" onclick="filterMenu('Non-Veg')">Non-Veg</button>
                <button class="filter-btn" onclick="filterMenu('Combos')">Combos</button>
                <button class="filter-btn" onclick="filterMenu('Beverages')">Beverages</button>
            </div>
            <input type="text" class="search-bar" id="search-input" placeholder="Search food..." onkeyup="searchMenu()">
        </div>

        <div class="menu-grid" id="menu-grid">
            <!-- Food cards injected via JS -->
            <p>Loading menu...</p>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal-overlay" id="cart-modal">
        <div class="modal">
            <span class="close-modal" onclick="closeCart()">&times;</span>
            <h2>Your Cart</h2>
            <div id="cart-items-container">
                <!-- Cart items injected via JS -->
            </div>

            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-amount">₹0.00</span>
            </div>

            <form class="checkout-form" id="checkout-form" onsubmit="placeOrder(event)">
                <input type="text" id="student-name" placeholder="Student Name" required>
                <input type="text" id="roll-number" placeholder="Roll Number" required>
                <select id="pickup-time" required>
                    <option value="">Select Pickup Time</option>
                    <option value="12:00 PM">12:00 PM</option>
                    <option value="12:30 PM">12:30 PM</option>
                    <option value="1:00 PM">1:00 PM</option>
                    <option value="1:30 PM">1:30 PM</option>
                    <option value="2:00 PM">2:00 PM</option>
                </select>
                <button type="submit" class="btn-primary" id="checkout-btn">Place Order</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
