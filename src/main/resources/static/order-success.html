<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - CampusBite</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo"><a href="menu.html">CampusBite</a></div>
        </div>
    </header>

    <div class="container">
        <div class="success-container">
            <h2>Order Placed Successfully!</h2>
            <p>Your order has been received. Please show this token at the canteen counter.</p>
            
            <div class="token-display" id="token-number">
                Loading...
            </div>
            
            <p>Pickup Time: <strong id="pickup-time">...</strong></p>
            <p>Status: <strong>PENDING</strong></p>

            <div style="margin-top: 2rem;">
                <button class="btn-primary" onclick="window.print()" style="margin-bottom: 1rem;">Print Token</button>
                <a href="menu.html" style="color: var(--primary-color); text-decoration: underline;">Back to Menu</a>
            </div>
        </div>
    </div>

    <script>
        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (token) {
            document.getElementById('token-number').innerText = token;
            
            // Fetch order details
            fetch(`/api/orders/track/${token}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('pickup-time').innerText = data.pickupTime || 'As soon as possible';
                })
                .catch(err => console.error(err));
        } else {
            document.getElementById('token-number').innerText = "Invalid Token";
        }
    </script>
</body>
</html>
