<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CampusBite</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo"><a href="index.html">CampusBite</a></div>
        </div>
    </header>

    <div class="container">
        <div class="login-container">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Canteen Staff Login</h2>
            
            <div id="error-msg" style="color: red; text-align: center; margin-bottom: 1rem; display: none;">
                Invalid username or password.
            </div>

            <!-- Standard Spring Security Form Login -->
            <form action="/api/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" style="width:100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px;" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" style="width:100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px;" required>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 1rem;">Login</button>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>
</html>
